services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=:8080
      - PYTHON_SERVICE_URL=http://python-service:8000
      - DB_URL=postgres://audit:audit@postgres:5432/auditdb?sslmode=disable
      - ALLOWED_ORIGINS=http://localhost:3000
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      - APP_COOKIE_SECURE=false
      - APP_COOKIE_SAME_SITE=Lax
      - APP_COOKIE_DOMAIN=
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_healthy

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: auditdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d auditdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
